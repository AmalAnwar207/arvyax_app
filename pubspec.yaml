name: arvyax_app
description: ArvyaX Immersive Journaling App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6

  # Navigation
  go_router: ^14.2.0

  # Audio
  just_audio: ^0.9.40

  # Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utils
  uuid: ^4.4.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Hive code generation (IMPORTANT)
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/audio/